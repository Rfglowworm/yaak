name: Build Yaak Windows x64

on:
  workflow_dispatch:
    inputs:
      yaak_ref:
        description: Official Yaak release tag
        required: true
        default: v2026.4.0
        type: string

permissions:
  contents: read

jobs:
  build-windows-x64:
    runs-on: windows-latest
    timeout-minutes: 60

    env:
      YAAK_TARGET_ARCH: x64
      YAAK_VERSION: ${{ inputs.yaak_ref }}

    steps:
      - name: Checkout official Yaak source
        uses: actions/checkout@v4
        with:
          repository: mountain-loop/yaak
          ref: ${{ inputs.yaak_ref }}
          fetch-depth: 1

      - name: Set up Node.js 24 and Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: yaak-windows-x64
          cache-on-failure: true

      - name: Set up protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: vp install

      - name: Set application version
        run: npm run replace-version

      - name: Build unsigned NSIS installer
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ./crates-tauri/yaak-app-client
          args: --bundles nsis

      - name: Collect installer and checksum
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"                                                                                                                                                                    

          $source = "target/release/bundle/nsis"                                                                                                                                                             
          $destination = "artifact"                                                                                                                                                                          

          New-Item -ItemType Directory -Force -Path $destination | Out-Null                                                                                                                                  

          $installers = @(                                                                                                                                                                                   
            Get-ChildItem -LiteralPath $source -Filter "*.exe" -File                                                                                                                                         
          )                                                                                                                                                                                                  

          if ($installers.Count -eq 0) {                                                                                                                                                                     
            throw "NSIS installer was not generated in: $source"                                                                                                                                             
          }                                                                                                                                                                                                  

          foreach ($installer in $installers) {                                                                                                                                                              
            Copy-Item -LiteralPath $installer.FullName -Destination $destination                                                                                                                             
          }                                                                                                                                                                                                  

          $checksumLines = foreach ($installer in Get-ChildItem -LiteralPath $destination -Filter "*.exe" -File) {                                                                                           
            $hash = (Get-FileHash -LiteralPath $installer.FullName -Algorithm SHA256).Hash                                                                                                                   
            "$hash  $($installer.Name)"                                                                                                                                                                      
          }                                                                                                                                                                                                  

          $checksumLines |                                                                                                                                                                                   
            Set-Content -LiteralPath "$destination/SHA256SUMS.txt" -Encoding ascii                                                                                                                           

          Get-ChildItem -LiteralPath $destination |                                                                                                                                                          
            Select-Object Name, Length                                                                                                                                              

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: yaak-${{ inputs.yaak_ref }}-windows-x64
          path: artifact/*
          if-no-files-found: error
          retention-days: 7
